<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Problems</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/scripts/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="problemsPage()" x-init="init()">
      <header class="header">
        <h1>Browse by Problem</h1>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="/companies">Companies</a>
          <a href="/problems">Problems</a>
        </nav>
      </header>

      <div class="filters">
        <input class="search" type="text" x-model="query" @input.debounce.150ms="applyFilters()" placeholder="Search by title..." />
        <select class="select" x-model="difficulty" @change="applyFilters()">
          <option value="">All difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>

      <div class="virtual-list problems-list" @scroll="onScroll" x-ref="listViewport" x-show="!loading && !error">
        <div :style="`height:${totalHeight}px; position:relative;`">
          <template x-for="row in visibleRows" :key="row.id">
            <article class="problem-row" :style="`transform: translateY(${row.top}px);`">
              <a :href="row.link" target="_blank" rel="noreferrer" x-text="row.title"></a>
              <span class="badge" :class="App.difficultyClass(row.difficulty)" x-text="row.difficulty"></span>
              <span x-text="App.formatPct(row.acceptance_rate)"></span>
              <strong x-text="App.formatNum(row.total_frequency)"></strong>
            </article>
          </template>
        </div>
      </div>

      <p class="panel-state" x-show="loading">Loading problems...</p>
      <p class="panel-state" x-show="!loading && !error" x-text="`${filtered.length} results`"></p>
      <p class="panel-state error" x-show="error" x-text="error"></p>
    </main>

    <script>
      function problemsPage() {
        return {
          App: window.App,
          loading: true,
          error: '',
          all: [],
          filtered: [],
          query: '',
          difficulty: '',
          rowHeight: 58,
          viewportHeight: 640,
          scrollTop: 0,
          async init() {
            this.loading = true;
            this.error = '';
            try {
              const res = await this.App.fetchJson('/api/problems?limit=5000');
              this.all = res.items || [];
              this.applyFilters();
            } catch (e) {
              this.error = e.message || 'Failed to load problems';
            } finally {
              this.loading = false;
              this.$nextTick(() => {
                if (this.$refs.listViewport) this.viewportHeight = this.$refs.listViewport.clientHeight;
              });
            }
          },
          applyFilters() {
            const q = this.query.trim().toLowerCase();
            this.filtered = this.all.filter(p => {
              if (this.difficulty && p.difficulty !== this.difficulty) return false;
              if (q && !p.title.toLowerCase().includes(q)) return false;
              return true;
            });
            this.scrollTop = 0;
            if (this.$refs.listViewport) this.$refs.listViewport.scrollTop = 0;
          },
          onScroll(e) {
            this.scrollTop = e.target.scrollTop;
          },
          get totalHeight() {
            return this.filtered.length * this.rowHeight;
          },
          get startIndex() {
            return Math.max(0, Math.floor(this.scrollTop / this.rowHeight) - 10);
          },
          get endIndex() {
            const visible = Math.ceil(this.viewportHeight / this.rowHeight) + 20;
            return Math.min(this.filtered.length, this.startIndex + visible);
          },
          get visibleRows() {
            const out = [];
            for (let i = this.startIndex; i < this.endIndex; i++) {
              const p = this.filtered[i];
              if (!p) continue;
              out.push({ ...p, top: i * this.rowHeight });
            }
            return out;
          }
        }
      }
    </script>
  </body>
</html>
