<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interview Company-wise Problems</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/scripts/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="homePage()" x-init="init()">
      <header class="header">
        <h1>What should I solve next?</h1>
        <div class="header-actions">
          <a class="select page-link" href="/companies">Company progress</a>
        </div>
      </header>

      <p class="subtitle">Sort and filter problems by frequency, company, and difficulty.</p>

      <section class="filters" x-show="!error" aria-label="Problem filters">
        <label class="sr-only" for="sort-by">Sort problems</label>
        <select id="sort-by" class="select" x-model="sortBy" @change="resetAndLoad()">
          <option value="frequency">Sort: Frequency</option>
          <option value="difficulty">Sort: Difficulty</option>
        </select>

        <label class="sr-only" for="difficulty-direction" x-show="sortBy === 'difficulty'">Difficulty direction</label>
        <select id="difficulty-direction" class="select" x-show="sortBy === 'difficulty'" x-model="difficultySortDir" @change="resetAndLoad()">
          <option value="asc">Difficulty: Ascending (Easy → Hard)</option>
          <option value="desc">Difficulty: Descending (Hard → Easy)</option>
        </select>

        <button class="select modal-trigger" type="button" @click="openCompanyModal()" aria-label="Open company selector">
          Select companies
        </button>

        <button class="select modal-trigger" type="button" x-show="selectedCompanyIds.length" @click="clearCompanies()" aria-label="Clear selected companies">
          Clear companies
        </button>
      </section>

      <div class="selected-companies" x-show="selectedCompanies.length">
        <template x-for="company in selectedCompanies" :key="company.id">
          <button class="company-chip" @click="removeCompany(company.id)">
            <img class="logo" :src="company.logo" :alt="company.name" loading="lazy" @error="$el.src='/logos/default.png'" />
            <span x-text="company.name"></span>
            <span>×</span>
          </button>
        </template>
      </div>

      <section class="cards" x-show="loading && !problems.length">
        <template x-for="n in 9" :key="n">
          <article class="card skeleton-card">
            <div class="skeleton line w-70"></div>
            <div class="skeleton line w-50"></div>
            <div class="skeleton line w-60"></div>
          </article>
        </template>
      </section>

      <section class="cards" x-show="!error && problems.length">
        <template x-for="problem in problems" :key="`${problem.id}-${problem.total_frequency}`">
          <article
            class="card"
            :class="{ 'card-solved': isSolved(problem.id) }"
            role="button"
            tabindex="0"
            @click="toggleSolved(problem.id, !isSolved(problem.id))"
            @keydown.enter.prevent="toggleSolved(problem.id, !isSolved(problem.id))"
            @keydown.space.prevent="toggleSolved(problem.id, !isSolved(problem.id))"
          >
            <div class="card-header">
              <a :href="problem.link" target="_blank" rel="noreferrer" @click.stop x-text="problem.title"></a>
              <span class="badge" :class="App.difficultyClass(problem.difficulty)" x-text="problem.difficulty"></span>
            </div>
            <div class="meta">
              <span x-text="`Frequency: ${App.formatNum(problem.total_frequency)}`"></span>
              <span x-text="isSolved(problem.id) ? 'Solved' : 'Not solved'"></span>
            </div>
          </article>
        </template>
      </section>

      <div class="panel-state" x-show="loadingMore">Loading more problems...</div>
      <p class="panel-state" x-show="!loading && !error && !problems.length">No problems found for this filter.</p>
      <p class="panel-state error" x-show="error" x-text="error"></p>
      <div x-ref="sentinel" style="height: 1px;"></div>

      <div class="modal-overlay" x-show="companyModalOpen" x-cloak @click.self="closeCompanyModal()" @keydown.escape.window="closeCompanyModal()">
        <div class="modal-card" x-ref="companyModal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="company-modal-title" @keydown.tab="trapModalFocus($event)">
          <div class="modal-head">
            <h3 id="company-modal-title">Select companies</h3>
            <button class="modal-close" type="button" aria-label="Close company selector" @click="closeCompanyModal()">✕</button>
          </div>

          <label class="sr-only" for="company-search">Search companies</label>
          <input id="company-search" x-ref="companySearchInput" class="search" type="text" x-model="companySearch" placeholder="Search companies..." />

          <div class="modal-grid">
            <template x-for="company in filteredCompanies" :key="company.id">
              <button class="modal-company" :class="{active: selectedCompanyIds.includes(company.id)}" @click="toggleCompanyAndRefetch(company.id)">
                <img class="logo large" :src="company.logo" :alt="company.name" loading="lazy" @error="$el.src='/logos/default.png'" />
                <span x-text="company.name"></span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </main>

    <script>
      function homePage() {
        return {
          App: window.App,
          loading: true,
          loadingMore: false,
          error: '',
          sortBy: 'frequency',
          difficultySortDir: 'asc',
          problems: [],
          companies: [],
          selectedCompanyIds: [],
          companySearch: '',
          companyModalOpen: false,
          lastFocusedElement: null,
          total: 0,
          offset: 0,
          limit: 60,
          hasMore: true,
          observer: null,
          progressVersion: 0,
          async init() {
            await this.loadCompanies();
            await this.resetAndLoad();
            this.initObserver();
          },
          async loadCompanies() {
            try {
              const companiesRes = await this.App.fetchJson('/api/companies');
              this.companies = companiesRes.items || [];
            } catch (e) {
              this.error = e.message || 'Failed to load companies';
            }
          },
          get filteredCompanies() {
            const q = this.companySearch.trim().toLowerCase();
            if (!q) return this.companies;
            return this.companies.filter(c => c.name.toLowerCase().includes(q));
          },
          get selectedCompanies() {
            if (!this.selectedCompanyIds.length) return [];
            const selected = new Set(this.selectedCompanyIds);
            return this.companies.filter(c => selected.has(c.id));
          },
          toggleCompany(companyId) {
            const id = Number(companyId);
            if (!id) return;
            if (this.selectedCompanyIds.includes(id)) {
              this.selectedCompanyIds = this.selectedCompanyIds.filter(v => v !== id);
              return;
            }
            this.selectedCompanyIds = [...this.selectedCompanyIds, id];
          },
          async toggleCompanyAndRefetch(companyId) {
            this.toggleCompany(companyId);
            await this.resetAndLoad();
          },
          async removeCompany(companyId) {
            this.selectedCompanyIds = this.selectedCompanyIds.filter(v => v !== Number(companyId));
            await this.resetAndLoad();
          },
          async clearCompanies() {
            this.selectedCompanyIds = [];
            await this.resetAndLoad();
          },
          openCompanyModal() {
            this.lastFocusedElement = document.activeElement;
            this.companyModalOpen = true;
            this.$nextTick(() => {
              this.$refs.companySearchInput?.focus();
            });
          },
          closeCompanyModal() {
            this.companyModalOpen = false;
            this.$nextTick(() => {
              this.lastFocusedElement?.focus?.();
            });
          },
          trapModalFocus(event) {
            if (!this.companyModalOpen) return;
            const root = this.$refs.companyModal;
            if (!root) return;

            const focusable = [...root.querySelectorAll(
              'a[href], area[href], input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), button:not([disabled]), [tabindex]:not([tabindex="-1"])'
            )];

            if (!focusable.length) {
              event.preventDefault();
              root.focus();
              return;
            }

            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            const active = document.activeElement;

            if (event.shiftKey && active === first) {
              event.preventDefault();
              last.focus();
            } else if (!event.shiftKey && active === last) {
              event.preventDefault();
              first.focus();
            }
          },

          buildProblemsUrl() {
            const params = new URLSearchParams({
              limit: String(this.limit),
              offset: String(this.offset),
              sort: this.sortBy,
            });
            if (this.sortBy === 'difficulty') {
              params.set('sort_dir', this.difficultySortDir);
            }
            if (this.selectedCompanyIds.length) {
              params.set('company_ids', this.selectedCompanyIds.join(','));
            }
            return `/api/problems?${params.toString()}`;
          },
          async resetAndLoad() {
            this.loading = true;
            this.error = '';
            this.problems = [];
            this.offset = 0;
            this.total = 0;
            this.hasMore = true;
            try {
              await this.fetchNextPage();
            } finally {
              this.loading = false;
            }
          },
          async fetchNextPage() {
            if (!this.hasMore || this.loadingMore) return;
            this.loadingMore = true;
            this.error = '';
            try {
              const res = await this.App.fetchJson(this.buildProblemsUrl());
              const items = res.items || [];
              this.total = Number(res.total || 0);
              this.problems = [...this.problems, ...items];
              this.offset += items.length;
              if (typeof res.has_more === 'boolean') {
                this.hasMore = res.has_more;
              } else {
                this.hasMore = this.offset < this.total && items.length > 0;
              }
            } catch (e) {
              this.error = e.message || 'Failed to load problems';
            } finally {
              this.loadingMore = false;
            }
          },
          initObserver() {
            this.observer = new IntersectionObserver(entries => {
              for (const entry of entries) {
                if (entry.isIntersecting) this.fetchNextPage();
              }
            }, { rootMargin: '240px 0px 240px 0px' });
            if (this.$refs.sentinel) this.observer.observe(this.$refs.sentinel);
          },
          isSolved(problemId) {
            this.progressVersion;
            return this.App.getProblemStatus(problemId) === 'Solved';
          },
          toggleSolved(problemId, checked) {
            this.App.setProblemStatus(problemId, checked ? 'Solved' : 'Not solved');
            this.progressVersion++;
          }
        }
      }
    </script>
  </body>
</html>
