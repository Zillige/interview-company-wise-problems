<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interview Company-wise Problems</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/scripts/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="homePage()" x-init="load()">
      <header class="header">
        <h1>Top Asked Problems</h1>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="/companies">Companies</a>
          <a href="/problems">Problems</a>
        </nav>
      </header>

      <p class="subtitle">Most asked interview problems across all companies.</p>

      <section class="cards" x-show="loading">
        <template x-for="n in 9" :key="n">
          <article class="card skeleton-card">
            <div class="skeleton line w-70"></div>
            <div class="skeleton line w-50"></div>
            <div class="skeleton line w-60"></div>
          </article>
        </template>
      </section>

      <section class="cards" x-show="!loading && !error">
        <template x-for="problem in problems" :key="problem.id">
          <article class="card">
            <div class="card-header">
              <a :href="problem.link" target="_blank" rel="noreferrer" x-text="problem.title"></a>
              <span class="badge" :class="App.difficultyClass(problem.difficulty)" x-text="problem.difficulty"></span>
            </div>
            <div class="meta">
              <span x-text="`Acceptance: ${App.formatPct(problem.acceptance_rate)}`"></span>
              <span x-text="`Frequency: ${App.formatNum(problem.total_frequency)}`"></span>
            </div>
            <div class="logos">
              <template x-for="company in problem.companies.slice(0, 10)" :key="`${problem.id}-${company.id}`">
                <img class="logo" :src="company.logo" :alt="company.name" :title="company.name" loading="lazy" @error="$el.src='/logos/default.png'" />
              </template>
            </div>
          </article>
        </template>
      </section>

      <p class="panel-state error" x-show="error" x-text="error"></p>
    </main>

    <script>
      function homePage() {
        return {
          App: window.App,
          loading: true,
          error: '',
          problems: [],
          async load() {
            this.loading = true;
            this.error = '';
            try {
              const res = await this.App.fetchJson('/api/top?limit=25');
              this.problems = res.items || [];

              const warm = () => {
                this.App.prefetch('/api/companies');
                this.App.prefetch('/api/problems?limit=5000');
                for (const c of (this.problems[0]?.companies || []).slice(0, 5)) {
                  this.App.prefetch(`/api/company?id=${c.id}`);
                }
              };
              if ('requestIdleCallback' in window) requestIdleCallback(warm, { timeout: 1200 });
              else setTimeout(warm, 250);
            } catch (e) {
              this.error = e.message || 'Failed to load top problems';
            } finally {
              this.loading = false;
            }
          }
        }
      }
    </script>
  </body>
</html>
