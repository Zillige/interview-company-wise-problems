<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Companies</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/scripts/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="companiesPage()" x-init="init()">
      <header class="header">
        <h1>Browse by Company</h1>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="/companies">Companies</a>
        </nav>
      </header>

      <input class="search" type="text" x-model="query" @input.debounce.120ms="applyFilter()" placeholder="Search ~470 companies..." />

      <section class="split" x-show="!error">
        <div class="list-panel">
          <div class="virtual-list" @scroll="onScroll" x-ref="listViewport">
            <div :style="`height:${totalHeight}px; position:relative;`">
              <template x-for="row in visibleRows" :key="row.id">
                <button
                  class="company-row"
                  :class="{active:selectedCompanyId===row.id}"
                  :style="`transform: translateY(${row.top}px);`"
                  @click="selectCompany(row)"
                >
                  <img class="logo" :src="row.logo" :alt="row.name" loading="lazy" @error="$el.src='/logos/default.png'" />
                  <span class="company-name" x-text="row.name"></span>
                  <span class="company-count" x-text="`${row.problem_count}`"></span>
                </button>
              </template>
            </div>
          </div>
        </div>

        <div class="detail-panel">
          <template x-if="selectedCompany">
            <div>
              <div class="detail-header">
                <img class="logo large" :src="selectedCompany.logo" :alt="selectedCompany.name" loading="lazy" @error="$el.src='/logos/default.png'" />
                <div>
                  <h2 x-text="selectedCompany.name"></h2>
                  <p x-text="`${selectedCompany.problem_count} mapped problems`"></p>
                  <p class="progress-text" x-text="selectedCompletionText()"></p>
                </div>
              </div>

              <div class="panel-state" x-show="detailLoading">Loading problems...</div>
              <div class="panel-state error" x-show="detailError" x-text="detailError"></div>

              <ul class="mini-list" x-show="!detailLoading && !detailError">
                <template x-for="problem in companyProblems" :key="problem.id">
                  <li>
                    <a :href="problem.link" target="_blank" rel="noreferrer" x-text="problem.title"></a>
                    <span class="badge" :class="App.difficultyClass(problem.difficulty)" x-text="problem.difficulty"></span>
                    <label class="solved-check">
                      <input type="checkbox" :checked="isSolved(problem.id)" @change="toggleSolved(problem.id, $event.target.checked)" /> Solved
                    </label>
                  </li>
                </template>
              </ul>
            </div>
          </template>
          <p class="panel-state" x-show="!selectedCompany">Select a company to load its problems.</p>
        </div>
      </section>

      <p class="panel-state" x-show="loading">Loading companies...</p>
      <p class="panel-state error" x-show="error" x-text="error"></p>
    </main>

    <script>
      function companiesPage() {
        return {
          App: window.App,
          loading: true,
          error: '',
          companies: [],
          filtered: [],
          query: '',
          selectedCompanyId: null,
          selectedCompany: null,
          companyProblems: [],
          companyProblemsAll: [],
          detailLoading: false,
          detailError: '',
          cache: {},
          progressVersion: 0,
          rowHeight: 56,
          viewportHeight: 560,
          scrollTop: 0,
          async init() {
            await this.loadCompanies();
            this.$nextTick(() => {
              if (this.$refs.listViewport) this.viewportHeight = this.$refs.listViewport.clientHeight;
            });
          },
          async loadCompanies() {
            this.loading = true;
            this.error = '';
            try {
              const res = await this.App.fetchJson('/api/companies');
              this.companies = res.items || [];
              this.filtered = this.companies;

              const warm = () => {
                for (const c of this.companies.slice(0, 12)) {
                  this.App.prefetch(`/api/company?id=${c.id}`);
                }
              };
              if ('requestIdleCallback' in window) requestIdleCallback(warm, { timeout: 1500 });
              else setTimeout(warm, 300);
            } catch (e) {
              this.error = e.message || 'Failed to load companies';
            } finally {
              this.loading = false;
            }
          },
          applyFilter() {
            const q = this.query.trim().toLowerCase();
            this.filtered = q ? this.companies.filter(c => c.name.toLowerCase().includes(q)) : this.companies;
            this.scrollTop = 0;
            if (this.$refs.listViewport) this.$refs.listViewport.scrollTop = 0;
          },
          onScroll(e) {
            this.scrollTop = e.target.scrollTop;
          },
          get totalHeight() {
            return this.filtered.length * this.rowHeight;
          },
          get startIndex() {
            return Math.max(0, Math.floor(this.scrollTop / this.rowHeight) - 8);
          },
          get endIndex() {
            const visible = Math.ceil(this.viewportHeight / this.rowHeight) + 16;
            return Math.min(this.filtered.length, this.startIndex + visible);
          },
          get visibleRows() {
            const out = [];
            for (let i = this.startIndex; i < this.endIndex; i++) {
              const c = this.filtered[i];
              if (!c) continue;
              out.push({ ...c, top: i * this.rowHeight });
            }
            return out;
          },
          async selectCompany(company) {
            this.selectedCompanyId = company.id;
            this.selectedCompany = company;
            this.detailError = '';

            if (this.cache[company.id]) {
              this.companyProblemsAll = this.cache[company.id];
              this.companyProblems = this.companyProblemsAll.slice(0, 100);
              return;
            }

            this.detailLoading = true;
            this.companyProblems = [];
            this.companyProblemsAll = [];
            try {
              const res = await this.App.fetchJson(`/api/company?id=${company.id}`);
              const problems = res.problems || [];
              this.cache[company.id] = problems;
              this.companyProblemsAll = problems;
              this.companyProblems = problems.slice(0, 100);
            } catch (e) {
              this.detailError = e.message || 'Failed to load company problems';
            } finally {
              this.detailLoading = false;
            }
          },
          isSolved(problemId) {
            this.progressVersion;
            return this.App.getProblemStatus(problemId) === 'Solved';
          },
          toggleSolved(problemId, checked) {
            this.App.setProblemStatus(problemId, checked ? 'Solved' : 'Not solved');
            this.progressVersion++;
          },
          selectedCompletionText() {
            this.progressVersion;
            const stats = this.App.computeSolvedStats(this.companyProblemsAll || []);
            return `Solved: ${stats.solved}/${stats.total} (${this.App.formatPct(stats.pct)})`;
          },
        }
      }
    </script>
  </body>
</html>
