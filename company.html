<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Company Detail</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/scripts/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="companyPage()" x-init="init()">
      <header class="header">
        <h1 x-text="company?.name || 'Company'">Company</h1>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="/companies">Companies</a>
          <a href="/problems">Problems</a>
        </nav>
      </header>

      <div x-show="loading" class="card skeleton-card">
        <div class="skeleton line w-70"></div>
        <div class="skeleton line w-40"></div>
        <div class="skeleton line w-60"></div>
      </div>

      <section x-show="!loading && !error && company" class="card company-detail-head">
        <div class="company-title">
          <img class="logo large" :src="company.logo" :alt="company.name" @error="$el.src='/logos/default.png'" />
          <div>
            <h2 x-text="company.name"></h2>
            <p x-text="`${company.problem_count} problems · total frequency ${App.formatNum(company.total_frequency)}`"></p>
          </div>
        </div>
      </section>

      <div class="filters" x-show="!loading && !error && company">
        <input class="search" type="text" x-model="query" placeholder="Search in this company..." />
        <select class="select" x-model="difficulty">
          <option value="">All difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>

      <section class="grid cards" x-show="!loading && !error && company">
        <template x-for="problem in filteredProblems()" :key="problem.id">
          <article class="card">
            <div class="card-header">
              <a :href="problem.link" target="_blank" rel="noreferrer" x-text="problem.title"></a>
              <span class="badge" :class="App.difficultyClass(problem.difficulty)" x-text="problem.difficulty"></span>
            </div>
            <div class="meta">
              <span x-text="`Acceptance: ${App.formatPct(problem.acceptance_rate)}`"></span>
              <span x-text="`Frequency: ${App.formatNum(problem.frequency)}`"></span>
            </div>
          </article>
        </template>
      </section>

      <p class="panel-state error" x-show="error" x-text="error"></p>
    </main>

    <script>
      function companyPage() {
        return {
          App: window.App,
          loading: true,
          error: '',
          company: null,
          query: '',
          difficulty: '',
          init() {
            this.load();
          },
          async load() {
            this.loading = true;
            this.error = '';
            try {
              const url = new URL(window.location.href);
              let name = url.searchParams.get('name');
              if (!name) {
                const parts = window.location.pathname.split('/').filter(Boolean);
                if (parts.length >= 2 && parts[0] === 'company') {
                  name = decodeURIComponent(parts[1]);
                }
              }
              if (!name) throw new Error('Company name missing in URL');
              const params = new URLSearchParams({ name });
              this.company = await this.App.fetchJson(`/api/company?${params.toString()}`);

              const warm = () => {
                this.App.prefetch('/api/companies');
                this.App.prefetch('/api/top?limit=25');
                this.App.prefetch('/api/problems?limit=5000');
              };
              if ('requestIdleCallback' in window) requestIdleCallback(warm, { timeout: 1200 });
              else setTimeout(warm, 250);
            } catch (e) {
              this.error = e.message || 'Failed to load company';
            } finally {
              this.loading = false;
            }
          },
          filteredProblems() {
            if (!this.company) return [];
            const q = this.query.trim().toLowerCase();
            return this.company.problems.filter(p => {
              const matchQuery = !q || p.title.toLowerCase().includes(q);
              const matchDifficulty = !this.difficulty || p.difficulty === this.difficulty;
              return matchQuery && matchDifficulty;
            });
          }
        }
      }
    </script>
  </body>
</html>
